<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل محلل الفيديو الذكي</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #EE1D52; font-size: 24px; margin-bottom: 4px; }
        .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
        .qr-container {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            display: inline-block;
        }
        .btn {
            display: inline-block;
            background: #EE1D52;
            color: white;
            padding: 14px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }
        .steps {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 16px;
            margin-top: 24px;
            text-align: right;
        }
        .steps p { margin: 6px 0; color: #444; font-size: 14px; }
        .warning {
            background: #fff3cd;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-size: 13px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 محلل الفيديو الذكي</h1>
        <p class="subtitle">حلل فيديوك وارفع احتمالية الوصول للترند بالذكاء الاصطناعي</p>

        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://github.com/clanpluse/ViralAnalyzer/releases/latest/download/app-debug.apk"
                 alt="QR Code" width="220" height="220">
        </div>

        <br>
        <a class="btn" href="https://github.com/clanpluse/ViralAnalyzer/releases/latest/download/app-debug.apk">
            تحميل مباشر
        </a>

        <div class="steps">
            <p><strong>خطوات التثبيت:</strong></p>
            <p>1. حمّل الملف</p>
            <p>2. افتح الإعدادات ← الأمان ← فعّل "مصادر غير معروفة"</p>
            <p>3. افتح الملف المحمّل وثبّت التطبيق</p>
        </div>

        <div class="warning">
            عند ظهور تحذير Google Play اضغط "تفاصيل أكثر" ثم "تثبيت على أي حال"
        </div>
    </div>
</body>
</html>
